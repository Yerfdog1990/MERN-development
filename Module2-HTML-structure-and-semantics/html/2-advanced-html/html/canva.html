<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>canvas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #222;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border-radius: 10px;
            background-color: #ffffff;
            border: 2px solid #555;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 1. Rectangle
    ctx.fillStyle = 'red';
    ctx.fillRect(50, 50, 150, 100);
    ctx.strokeStyle = 'black';
    ctx.strokeRect(50, 50, 150, 100);

    // 2. Triangle
    ctx.beginPath();
    ctx.moveTo(300, 50);
    ctx.lineTo(250, 150);
    ctx.lineTo(350, 150);
    ctx.closePath();
    ctx.fillStyle = 'blue';
    ctx.fill();
    ctx.stroke();

    // 3. Circle
    ctx.beginPath();
    ctx.arc(500, 100, 50, 0, Math.PI * 2);
    ctx.fillStyle = 'green';
    ctx.fill();
    ctx.stroke();

    // 4. Semicircle
    ctx.beginPath();
    ctx.arc(650, 100, 50, 0, Math.PI, false);
    ctx.fillStyle = 'orange';
    ctx.fill();
    ctx.stroke();

    // 5. Curve (Quadratic)
    ctx.beginPath();
    ctx.moveTo(50, 250);
    ctx.quadraticCurveTo(150, 150, 250, 250);
    ctx.strokeStyle = 'purple';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.lineWidth = 1; // Reset line width

    // 6. Lines
    // Horizontal
    ctx.beginPath();
    ctx.moveTo(300, 250);
    ctx.lineTo(500, 250);
    ctx.strokeStyle = 'black';
    ctx.stroke();

    // Vertical
    ctx.beginPath();
    ctx.moveTo(550, 200);
    ctx.lineTo(550, 300);
    ctx.stroke();

    // Diagonal
    ctx.beginPath();
    ctx.moveTo(600, 200);
    ctx.lineTo(750, 300);
    ctx.stroke();

    // 7. Text "Hello world"
    ctx.font = '30px Arial';
    ctx.fillStyle = 'black';
    ctx.fillText('Hello world', 50, 400);

</script>
</body>
</html>
