<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>file-input</title>
</head>
<body>
<input type="file" id="fileInput" onchange="displayFileData()">
<div id="output"></div>
<script>
  function displayFileData() {
    const fileInput = document.getElementById('fileInput');
    const output = document.getElementById('output');
    output.innerText =
            "Filename: " +fileInput.files[0].name
            + "\nFiletype: " +fileInput.files[0].type
            + "\nFilesize: " +fileInput.files[0].size + " bytes";

  }
</script>
</body>
</html>
