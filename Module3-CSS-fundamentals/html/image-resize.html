<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
  <style>
    .container {
      width: 100px;
      height: 50px;
      background: red;
      border: 1px solid black;
      border-radius: 5px;
    }
    /* Method 1 — Cover (fills, may crop) */
    .img1 {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Method 2 — Contain (shows full image, may leave space) */
    .img2 {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Method 3 — Responsive scale-down (no fixed container height needed) */
    .img3 {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
<h3><u>Method 1 — Cover (fills, may crop)</u></h3>
<div class="container">
  <img class="img1" src="../assets/rosego.jpeg" alt="logo">
</div>
<br><br>
<h3><u>Method 2 — Contain (shows full image, may leave space) </u></h3>
<div class="container">
  <img class="img2" src="../assets/rosego.jpeg" alt="logo">
</div>
<br><br>
<h3><u>Method 3 — Responsive scale-down (no fixed container height needed)</u></h3>
<div class="container">
  <img class="img3" src="../assets/rosego.jpeg" alt="logo">
</div>
<br><br>
</body>
</html>
