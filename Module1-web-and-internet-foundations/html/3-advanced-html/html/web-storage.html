<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>web-storage</title>
</head>
<body>
<label for="productName">Product Name:</label>
<input type="text" id="productName" placeholder="Enter product name">
<label for="productPrice">Product Price:</label>
<input type="number" id="productPrice" placeholder="Enter product price">
<button onclick="addToCart()">Add to Cart</button>
<div id="output"></div>

<script>
  function showCart() {
    let cart = sessionStorage.getItem('cart');
    if (!cart) {
      document.getElementById('output').innerHTML = 'Cart is empty';
      return;
    }
    cart = JSON.parse(cart);
    let output = document.getElementById('output');
    if (cart.length === 0) {
      output.innerHTML = 'Cart is empty';
    } else {
      let table = '<table border="1">';
      table += '<tr><th>Product Name</th><th>Product Price</th></tr>';
      for (let i = 0; i < cart.length; i++) {
        table += '<tr><td>' + cart[i].name + '</td><td>' + cart[i].price + '</td></tr>';
      }
      table += '</table>';
      output.innerHTML = table;
    }
  }
  function addToCart() {
    let cart = sessionStorage.getItem('cart');
    if (cart === null) {
      cart = [];
    } else {
      cart = JSON.parse(cart);
    }
    let productName = document.getElementById('productName').value;
    let productPrice = document.getElementById('productPrice').value;

    if (productName && productPrice) {
      let product = {
        name: productName,
        price: productPrice
      }
      cart.push(product);
      sessionStorage.setItem('cart', JSON.stringify(cart));
      showCart();
      // Clear inputs
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
    }
  }
  showCart();
</script>
</body>
</html>
