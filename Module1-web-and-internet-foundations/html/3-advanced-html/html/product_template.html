<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Description Template Demo</title>
    <style>
        .product-card {
            border: 1px solid #ccc;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
            width: 300px;
        }
        .category { font-style: italic; color: #666; }
        .brand { font-weight: bold; }
        .price { color: #d9534f; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Product Description Template Demo</h1>
    <div id="container"></div>

    <!-- HTML Template for Product Description -->
    <template id="product-template">
        <div class="product-card">
            <h2 class="name">Product Name</h2>
            <p class="category">Category: <span></span></p>
            <p class="brand">Brand: <span></span></p>
            <p class="price">Price: $<span></span></p>
        </div>
    </template>

    <script>
        const template = document.getElementById('product-template');
        const container = document.getElementById('container');

        // Sample Product Data
        const productA = { name: "Smartphone X", category: "Electronics", brand: "TechBrand", price: "799" };
        const productB = { name: "Leather Jacket", category: "Apparel", brand: "StyleCo", price: "150" };
        const productC = { name: "Mechanical Keyboard", category: "Peripherals", brand: "Clicky", price: "120" };

        // --- Way 1: Using document.importNode() ---
        // This is the most formal way to import a node from an external document/template.
        function method1(data) {
            const clone = document.importNode(template.content, true);
            clone.querySelector('.name').textContent = data.name;
            clone.querySelector('.category span').textContent = data.category;
            clone.querySelector('.brand span').textContent = data.brand;
            clone.querySelector('.price span').textContent = data.price;
            container.appendChild(clone);
            console.log("Method 1 (importNode) used for:", data.name);
        }

        // --- Way 2: Using element.cloneNode() ---
        // A more direct way to clone the template content.
        function method2(data) {
            const clone = template.content.cloneNode(true);
            clone.querySelector('.name').textContent = data.name;
            clone.querySelector('.category span').textContent = data.category;
            clone.querySelector('.brand span').textContent = data.brand;
            clone.querySelector('.price span').textContent = data.price;
            container.appendChild(clone);
            console.log("Method 2 (cloneNode) used for:", data.name);
        }

        // --- Way 3: Using template.innerHTML (String-based activation) ---
        // Useful if you need to perform string replacements before insertion (not always recommended, but a valid approach).
        function method3(data) {
            const htmlString = template.innerHTML;
            const div = document.createElement('div');
            div.innerHTML = htmlString;
            
            div.querySelector('.name').textContent = data.name;
            div.querySelector('.category span').textContent = data.category;
            div.querySelector('.brand span').textContent = data.brand;
            div.querySelector('.price span').textContent = data.price;
            
            container.appendChild(div.firstElementChild);
            console.log("Method 3 (innerHTML) used for:", data.name);
        }

        // Activate the three methods
        method1(productA);
        method2(productB);
        method3(productC);
    </script>
</body>
</html>
